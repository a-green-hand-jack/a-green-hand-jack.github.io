name: Publish CORAL Chinese documentation

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-coral-zh.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Attach verified payload blobs and publish loader
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GH_TOKEN']
          api = f'https://api.github.com/repos/{repo}'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'coral-zh-publisher',
          }

          def call(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              request = urllib.request.Request(api + path, data=data, headers=headers, method=method)
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          loader = r'''<!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <meta name="description" content="CORAL 中文文档 — 完整中文翻译版">
            <title>CORAL 中文文档</title>
            <style>
              :root{color-scheme:light dark;font-family:Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7f8fb;color:#16181d}.card{width:min(560px,calc(100% - 32px));padding:40px;border:1px solid #e3e6eb;border-radius:18px;background:#fff;box-shadow:0 18px 60px rgba(20,28,45,.08);text-align:center}.logo{width:48px;height:48px;margin:0 auto 18px;border-radius:14px;display:grid;place-items:center;background:#121722;color:#fff;font-weight:800;font-size:22px}h1{margin:0 0 12px;font-size:26px}p{margin:0;color:#626a78;line-height:1.7}.bar{height:6px;margin:26px 0 16px;overflow:hidden;border-radius:999px;background:#e9ecf1}.bar::after{content:"";display:block;width:42%;height:100%;border-radius:inherit;background:#171c27;animation:load 1.15s ease-in-out infinite alternate}@keyframes load{to{transform:translateX(138%)}}small{color:#858d9b;word-break:break-word}@media(prefers-color-scheme:dark){body{background:#0d1016;color:#f1f3f7}.card{background:#151922;border-color:#2b313d;box-shadow:none}.logo{background:#f0f2f6;color:#11151d}p,small{color:#9da6b5}.bar{background:#252b36}.bar::after{background:#e8ebf1}}
            </style>
          </head>
          <body>
            <main class="card" aria-live="polite">
              <div class="logo">C</div><h1>CORAL 中文文档</h1>
              <p id="status">正在载入完整中文文档站点……</p>
              <div class="bar" aria-hidden="true"></div>
              <small>首次打开需要下载约 130 KB 的压缩文档数据。</small>
            </main>
            <script>
            (async()=>{
              const status=document.getElementById('status');
              const files=[
                ['chunk-00.txt'],['chunk-01.txt'],['chunk-02.txt'],['chunk-03.txt'],
                ['part-08.txt'],['part-09.txt'],['part-10.txt'],['part-11.txt'],['part-12.txt'],['part-13.txt'],
                ['part-14a.txt'],['part-14b.txt'],['part-15a.txt'],['part-15b.txt'],
                ['enc-16a.txt',1],['enc-16b.txt',1],['enc-17.txt',1],['enc-18.txt',1],
                ['part-19.txt'],['part-20.txt'],['part-21.txt'],['part-22.txt']
              ];
              let done=0;
              const chunks=await Promise.all(files.map(async([name,decode])=>{
                const response=await fetch(name,{cache:'no-store'});
                if(!response.ok)throw new Error(`${name}: HTTP ${response.status}`);
                const text=(await response.text()).trim();
                done+=1;status.textContent=`正在载入完整中文文档站点…… ${done}/${files.length}`;
                return decode?atob(text):text;
              }));
              const b64=chunks.join('');
              if(b64.length!==133052)throw new Error(`数据长度异常：${b64.length}（预期 133052）`);
              const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
              if(typeof DecompressionStream==='undefined')throw new Error('当前浏览器不支持 DecompressionStream，请升级浏览器后重试。');
              const html=await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
              document.open();document.write(html);document.close();
            })().catch(error=>{
              console.error(error);document.querySelector('.bar').style.display='none';
              document.getElementById('status').innerHTML=`<strong>加载失败</strong><br><small>${String(error.message||error)}</small>`;
            });
            </script>
          </body>
          </html>'''

          ref = call('GET', '/git/ref/heads/main')
          head = ref['object']['sha']
          base_commit = call('GET', f'/git/commits/{head}')
          base_tree = base_commit['tree']['sha']
          loader_sha = call('POST', '/git/blobs', {'content': loader, 'encoding': 'utf-8'})['sha']

          entries = [
              {'path': 'coral-zh/index.html', 'mode': '100644', 'type': 'blob', 'sha': loader_sha},
              {'path': 'coral-zh/part-08.txt', 'mode': '100644', 'type': 'blob', 'sha': 'd339348c6b44f685b7f91eee5d3de9484c06e61b'},
              {'path': 'coral-zh/part-09.txt', 'mode': '100644', 'type': 'blob', 'sha': '57623147ae21acd34151986f47d03ad50f136c67'},
              {'path': 'coral-zh/part-10.txt', 'mode': '100644', 'type': 'blob', 'sha': 'a095931f833ad1b5153ada200b8916a92ce6f6c3'},
              {'path': 'coral-zh/part-11.txt', 'mode': '100644', 'type': 'blob', 'sha': 'a4b82edea1d392ee8df90023660e8d4d70461674'},
              {'path': 'coral-zh/part-12.txt', 'mode': '100644', 'type': 'blob', 'sha': 'ffb50b8ff079fa846e6c7b74c17833645b668c3f'},
              {'path': 'coral-zh/part-13.txt', 'mode': '100644', 'type': 'blob', 'sha': 'ee2f5056c48b48b294eab55ac4dbd6010b36cd93'},
              {'path': 'coral-zh/part-14a.txt', 'mode': '100644', 'type': 'blob', 'sha': '1cc3fb3cd3a949518477fb8db58666d2c7bcb53f'},
              {'path': 'coral-zh/part-14b.txt', 'mode': '100644', 'type': 'blob', 'sha': '8f92edb660376d5e7f9a38f6a04ea89726b92927'},
              {'path': 'coral-zh/part-15a.txt', 'mode': '100644', 'type': 'blob', 'sha': '764b8ccedf0c0716a3d9c06f81bfb874dfd0bd64'},
              {'path': 'coral-zh/part-15b.txt', 'mode': '100644', 'type': 'blob', 'sha': '8c8298b98f6b899a47415124e3d07ae9de683ab6'},
              {'path': 'coral-zh/enc-16a.txt', 'mode': '100644', 'type': 'blob', 'sha': '598cd6fb7576567a69003626feee3d1b2fb79133'},
              {'path': 'coral-zh/enc-16b.txt', 'mode': '100644', 'type': 'blob', 'sha': 'c54ac2921abc92b16b70d9983b4ff7fa7ce53d29'},
              {'path': 'coral-zh/enc-17.txt', 'mode': '100644', 'type': 'blob', 'sha': 'ab4dd75ee4f2ef42a97e5d85078c419b9455225e'},
              {'path': 'coral-zh/enc-18.txt', 'mode': '100644', 'type': 'blob', 'sha': '54a249ef00fa9bca50a13ae385d6f98d45c33923'},
              {'path': 'coral-zh/part-19.txt', 'mode': '100644', 'type': 'blob', 'sha': '38ab096907526ae365f53b72ddd1be22d0e5691f'},
              {'path': 'coral-zh/part-20.txt', 'mode': '100644', 'type': 'blob', 'sha': '50a2431c811b954621161855e0a6ef9624354083'},
              {'path': 'coral-zh/part-21.txt', 'mode': '100644', 'type': 'blob', 'sha': '3d90893923e2fcaa5a727b0d5cdc31325e2f3a73'},
              {'path': 'coral-zh/part-22.txt', 'mode': '100644', 'type': 'blob', 'sha': '1681cff3fd37ca7e8d6f952b3d91f382281981df'},
          ]

          tree_sha = call('POST', '/git/trees', {'base_tree': base_tree, 'tree': entries})['sha']
          commit_sha = call('POST', '/git/commits', {
              'message': 'feat(coral-zh): publish complete Chinese documentation site',
              'tree': tree_sha,
              'parents': [head],
          })['sha']
          call('PATCH', '/git/refs/heads/main', {'sha': commit_sha, 'force': False})
          print(f'Published commit {commit_sha}')
          PY
